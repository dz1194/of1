# MinIO values — managed by Argo CD (wave 0)
# LIVE storage cho Harbor registry. KHÔNG phải backup target.

mode: standalone

# Credentials đọc từ Secret (tạo bởi create-secrets.sh), KHÔNG hardcode ở đây.
existingSecret: "minio-credentials"

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

persistence:
  enabled: true
  storageClass: "longhorn"
  size: 50Gi

service:
  type: ClusterIP
  port: 9000

consoleService:
  type: ClusterIP
  port: 9001

# Tạo bucket harbor-registry khi khởi động
buckets:
  - name: harbor-registry
    policy: none
    purge: false

ingress:
  enabled: false
  # Bật nếu muốn truy cập MinIO console từ ngoài:
  # enabled: true
  # ingressClassName: nginx
  # hosts:
  #   - minio-console.example.local
