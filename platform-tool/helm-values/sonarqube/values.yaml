# SonarQube values — managed by Argo CD (wave 1)
# Depends on: Longhorn (wave 0) phải Healthy trước.
# BẮT BUỘC: vm.max_map_count=262144 trên node (node-setup.sh)

replicaCount: 1

resources:
  requests:
    cpu: "500m"
    memory: "2Gi"
  limits:
    cpu: "1000m"
    memory: "4Gi"   # 4Gi — 2Gi không đủ khi scan project lớn, dễ OOM

# Giới hạn heap JVM để tránh OOM
env:
  - name: SONAR_WEB_JAVAOPTS
    value: "-Xmx512m -Xms512m"
  - name: SONAR_CE_JAVAOPTS
    value: "-Xmx512m -Xms512m"
  - name: SONAR_SEARCH_JAVAOPTS
    value: "-Xmx512m -Xms512m -XX:+UseG1GC"

persistence:
  enabled: true
  storageClass: "longhorn"
  size: 5Gi

# initContainer fix vm.max_map_count nếu node chưa set
initSysctl:
  enabled: true
  vmMaxMapCount: 262144
  securityContext:
    privileged: true
    runAsUser: 0

ingress:
  enabled: true
  className: nginx
  hosts:
    - name: sonarqube.example.local   # ← thay bằng domain thật
  tls: []

# Bundled PostgreSQL — Guaranteed QoS (req == limit cho RAM)
postgresql:
  enabled: true
  auth:
    existingSecret: "sonarqube-db-password"   # tạo bởi create-secrets.sh
    username: "sonar"
    database: "sonar"
  primary:
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"   # Guaranteed QoS
    persistence:
      enabled: true
      storageClass: "longhorn"
      size: 8Gi
