# pg_dump CronJobs — managed by Argo CD (wave 3)
# Dump Harbor + SonarQube Postgres → upload CMC S3 (off-site backup)
# Credentials đọc từ Secret "cmc-s3-credentials" (tạo bởi create-secrets.sh)
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: harbor-db-backup
  namespace: harbor
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pg-dump
              image: amazon/aws-cli:latest
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  apk add --no-cache postgresql-client 2>/dev/null || true
                  DUMP_FILE="/tmp/harbor-$(date +%Y%m%d-%H%M%S).pgdump"
                  echo "==> Dumping Harbor DB..."
                  pg_dump -h harbor-database \
                    -U postgres -d registry \
                    -Fc -f "$DUMP_FILE"
                  echo "==> Uploading to CMC S3..."
                  aws s3 cp "$DUMP_FILE" \
                    "s3://platform-backup/harbor/$(basename $DUMP_FILE)" \
                    --endpoint-url "$AWS_ENDPOINTS" \
                    --region hn-1
                  echo "==> Done."
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: harbor-database-password
                      key: POSTGRES_PASSWORD
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: cmc-s3-credentials
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: cmc-s3-credentials
                      key: AWS_SECRET_ACCESS_KEY
                - name: AWS_ENDPOINTS
                  valueFrom:
                    secretKeyRef:
                      name: cmc-s3-credentials
                      key: AWS_ENDPOINTS
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "200m"
                  memory: "128Mi"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: sonarqube-db-backup
  namespace: sonarqube
spec:
  schedule: "30 2 * * *"   # 30 phút sau Harbor để tránh tranh tài nguyên
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pg-dump
              image: amazon/aws-cli:latest
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  apk add --no-cache postgresql-client 2>/dev/null || true
                  DUMP_FILE="/tmp/sonarqube-$(date +%Y%m%d-%H%M%S).pgdump"
                  echo "==> Dumping SonarQube DB..."
                  pg_dump -h sonarqube-postgresql \
                    -U sonar -d sonar \
                    -Fc -f "$DUMP_FILE"
                  echo "==> Uploading to CMC S3..."
                  aws s3 cp "$DUMP_FILE" \
                    "s3://platform-backup/sonarqube/$(basename $DUMP_FILE)" \
                    --endpoint-url "$AWS_ENDPOINTS" \
                    --region hn-1
                  echo "==> Done."
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: sonarqube-db-password
                      key: password
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: cmc-s3-credentials
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: cmc-s3-credentials
                      key: AWS_SECRET_ACCESS_KEY
                - name: AWS_ENDPOINTS
                  valueFrom:
                    secretKeyRef:
                      name: cmc-s3-credentials
                      key: AWS_ENDPOINTS
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "200m"
                  memory: "128Mi"
