# ingress-nginx values — managed by Argo CD (wave -1)
# Depends on: MetalLB Healthy (wave -2) để nhận EXTERNAL-IP

controller:
  # Dùng DaemonSet thay Deployment trên single-node để đảm bảo luôn có pod trên node
  kind: DaemonSet

  # Service type LoadBalancer — MetalLB cấp IP từ platform-pool
  service:
    type: LoadBalancer
    # Gim IP cố định từ pool MetalLB (tuỳ chọn nhưng khuyến nghị)
    # loadBalancerIP: "192.168.1.210"   # ← bỏ comment và điền IP cụ thể nếu muốn

  # Bật ssl-passthrough để Argo CD (HTTPS backend) hoạt động đúng
  extraArgs:
    enable-ssl-passthrough: ""

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  # Cho phép snippet annotation (Harbor cần proxy-body-size)
  allowSnippetAnnotations: true

  config:
    # Tăng timeout cho Harbor push image lớn
    proxy-body-size: "0"
    proxy-read-timeout: "900"
    proxy-send-timeout: "900"

  metrics:
    enabled: false   # bật khi có Prometheus

defaultBackend:
  enabled: false
