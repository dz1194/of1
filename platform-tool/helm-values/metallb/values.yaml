# MetalLB values — managed by Argo CD (wave -2)
# Chart chỉ cài controller + speaker; IP pool cấu hình riêng qua metallb/templates/

controller:
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

speaker:
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"
  # Bỏ frr nếu không cần BGP (L2 mode đủ cho lab)
  frr:
    enabled: false
