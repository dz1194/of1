# Jenkins values — managed by Argo CD (wave 2)
# Depends on: Harbor (wave 1) phải Healthy — agent image pull từ Harbor.

controller:
  # Admin credentials từ Secret (tạo bởi create-secrets.sh)
  adminSecret: true
  existingSecret: "jenkins-admin"
  adminUser: "admin"

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"

  javaOpts: "-Xmx1536m -Xms512m -XX:+UseG1GC"

  JCasC:
    defaultConfig: true

  ingress:
    enabled: true
    ingressClassName: nginx
    hostName: jenkins.example.local   # ← thay bằng domain thật
    tls: []

  installPlugins:
    - kubernetes:latest
    - workflow-aggregator:latest
    - git:latest
    - configuration-as-code:latest
    - sonar:latest
    - docker-workflow:latest

persistence:
  enabled: true
  storageClass: "longhorn"
  size: 10Gi

agent:
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      # CPU limit không đặt để tránh throttling khi build burst
      # cpu: "1000m"
      memory: "2Gi"
