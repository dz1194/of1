# Argo CD bootstrap values
# Chỉ dùng 1 lần trong bootstrap.sh — sau đó Argo CD tự quản lý chính nó qua GitOps.

global:
  domain: argocd.example.local   # ← thay bằng domain thật

configs:
  params:
    # Argo CD server chạy insecure — Ingress (nginx) xử lý TLS terminate
    server.insecure: true
  cm:
    # Bật Helm multi-source (dùng trong Application manifests)
    # Không cần config thêm — enabled by default từ ArgoCD 2.6+
    application.resourceTrackingMethod: annotation

server:
  ingress:
    enabled: true
    ingressClassName: nginx
    hostname: argocd.example.local   # ← thay bằng domain thật
    tls: true
    annotations:
      nginx.ingress.kubernetes.io/ssl-passthrough: "true"
      nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

controller:
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

repoServer:
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

applicationSet:
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

notifications:
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

redis:
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"
