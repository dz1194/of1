# Root Application — "App of Apps" pattern
# Apply thủ công 1 lần (qua bootstrap.sh). Sau đó Argo CD tự quản lý.
# Argo CD sẽ đọc thư mục apps/ từ Git và tạo tất cả Application bên dưới.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/dz1194/of1.git     # bootstrap.sh tự patch giá trị này
    targetRevision: main
    path: apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true      # xóa Application nếu file bị xóa khỏi Git
      selfHeal: true   # tự revert nếu ai đó sửa tay trên cluster
    syncOptions:
      - CreateNamespace=true
