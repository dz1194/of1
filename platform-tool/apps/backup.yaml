# wave 3 — chờ tất cả app Healthy trước khi tạo backup jobs
# Sync raw manifests từ helm-values/backup/templates/ (không phải Helm chart)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backup
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/dz1194/of1.git
    targetRevision: HEAD
    path: platform-tool/helm-values/backup/templates
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system   # namespace mặc định; manifest tự khai namespace riêng
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
