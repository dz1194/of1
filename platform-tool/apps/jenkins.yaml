# wave 2 — chờ wave 1 (Harbor + SonarQube) Healthy
# Jenkins cần: Harbor (pull agent image), Longhorn PVC (JENKINS_HOME)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jenkins
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://charts.jenkins.io
      chart: jenkins
      targetRevision: "5.x"
      helm:
        valueFiles:
          - $values/helm-values/jenkins/values.yaml
    - repoURL: YOUR_GIT_REPO_URL
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: jenkins
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
