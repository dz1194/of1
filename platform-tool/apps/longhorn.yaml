# wave 0 — Longhorn phải Healthy trước khi bất kỳ tool nào có PVC được sync
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    # Source 1: Helm chart từ official repo
    - repoURL: https://charts.longhorn.io
      chart: longhorn
      targetRevision: "1.7.x"
      helm:
        valueFiles:
          - $values/platform-tool/helm-values/longhorn/values.yaml
    # Source 2: values.yaml từ Git repo của bạn
    - repoURL: https://github.com/dz1194/of1.git   # ← thay (hoặc để bootstrap.sh patch)
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # Longhorn CRD lớn, cần server-side apply
  # Health check tuỳ chỉnh: chờ DaemonSet longhorn-manager rollout xong
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /status
