# wave 0 — cùng wave với Longhorn; MinIO cần PVC từ Longhorn
# Argo CD sync wave 0 song song (Longhorn + MinIO), nhưng MinIO pod sẽ pending
# cho đến khi Longhorn StorageClass sẵn sàng cấp PVC — tự giải quyết.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://charts.min.io
      chart: minio
      targetRevision: "5.x"
      helm:
        valueFiles:
          - $values/helm-values/minio/values.yaml
    - repoURL: https://github.com/dz1194/of1.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: minio
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
