apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  openproject.yaml: |
    apiVersion: 1
    datasources:
      - name: OpenProject-PG
        type: postgres
        url: postgresql.openproject.svc.cluster.local:5432
        database: openproject
        user: grafana_ro
        secureJsonData:
          password: "${GRAFANA_RO_PASSWORD}"
        jsonData:
          sslmode: disable
          postgresVersion: 1500
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: monitoring
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: OF1 Dashboards
        type: file
        disableDeletion: true
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-of1
  namespace: monitoring
data:
  of1-flow-metrics.json: |
    {
      "title": "OF1 - Flow Metrics",
      "uid": "of1-flow",
      "panels": [
        {
          "title": "WIP per Status",
          "type": "bargauge",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "targets": [{
            "datasource": "OpenProject-PG",
            "rawSql": "SELECT s.name AS status, COUNT(*) AS wip FROM work_packages wp JOIN statuses s ON s.id = wp.status_id WHERE wp.type_id IN (1,2,3) GROUP BY s.name ORDER BY wip DESC",
            "format": "table"
          }]
        },
        {
          "title": "Throughput (Features Done per Week)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "targets": [{
            "datasource": "OpenProject-PG",
            "rawSql": "SELECT DATE_TRUNC('week', updated_at) AS time, COUNT(*) AS done FROM work_packages WHERE status_id = 12 AND type_id = 2 AND updated_at >= NOW() - INTERVAL '90 days' GROUP BY 1 ORDER BY 1",
            "format": "time_series"
          }]
        },
        {
          "title": "Avg Cycle Time per Phase (hours)",
          "type": "table",
          "gridPos": { "x": 0, "y": 8, "w": 24, "h": 10 },
          "targets": [{
            "datasource": "OpenProject-PG",
            "rawSql": "SELECT jd.value AS to_status_id, s.name AS status, ROUND(AVG(EXTRACT(EPOCH FROM (LEAD(j.created_at) OVER (PARTITION BY j.journable_id ORDER BY j.created_at) - j.created_at)) / 3600)::numeric, 1) AS avg_hours FROM journals j JOIN journal_details jd ON jd.journal_id = j.id AND jd.prop_key = 'status_id' JOIN statuses s ON s.id = jd.value::integer WHERE j.journable_type = 'WorkPackage' GROUP BY jd.value, s.name ORDER BY avg_hours DESC NULLS LAST",
            "format": "table"
          }]
        },
        {
          "title": "Aging Work Items (days in current status)",
          "type": "table",
          "gridPos": { "x": 0, "y": 18, "w": 24, "h": 10 },
          "targets": [{
            "datasource": "OpenProject-PG",
            "rawSql": "SELECT wp.id, wp.subject, s.name AS status, u.login AS assignee, EXTRACT(DAY FROM NOW() - wp.updated_at)::int AS days_in_status FROM work_packages wp JOIN statuses s ON s.id = wp.status_id LEFT JOIN users u ON u.id = wp.assigned_to_id WHERE wp.status_id NOT IN (12, 13) ORDER BY days_in_status DESC LIMIT 20",
            "format": "table"
          }]
        }
      ],
      "schemaVersion": 38,
      "version": 1
    }
