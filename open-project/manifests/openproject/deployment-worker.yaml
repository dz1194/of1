apiVersion: apps/v1
kind: Deployment
metadata:
  name: openproject-worker
  namespace: openproject
  labels:
    app: openproject
    component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: openproject
      component: worker
  template:
    metadata:
      labels:
        app: openproject
        component: worker
    spec:
      containers:
        - name: worker
          image: openproject/community:14.3.0
          command: ["./docker/prod/worker"]
          envFrom:
            - configMapRef:
                name: openproject-env
          env:
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: openproject-secret
                  key: secret-key-base
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: openproject-db-secret
                  key: database-url
            - name: OPENPROJECT_FOG__CREDENTIALS__AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: openproject-minio-secret
                  key: access-key
            - name: OPENPROJECT_FOG__CREDENTIALS__AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: openproject-minio-secret
                  key: secret-key
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 1
          livenessProbe:
            exec:
              command: ["pgrep", "-f", "good_job"]
            initialDelaySeconds: 60
            periodSeconds: 60
            failureThreshold: 3
