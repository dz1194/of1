apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: of1-memcached
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: of1
  source:
    repoURL: https://github.com/dz1194/of1.git
    targetRevision: main
    path: open-project/manifests/memcached

  destination:
    server: https://kubernetes.default.svc
    namespace: openproject

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
