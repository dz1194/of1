apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: of1-postgresql
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: of1
  source:
    repoURL: https://github.com/dz1194/of1.git
    targetRevision: main
    path: open-project/manifests/postgresql

  destination:
    server: https://kubernetes.default.svc
    namespace: openproject

  syncPolicy:
    automated:
      prune: false      # KHÔNG auto-prune StatefulSet database
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/volumeClaimTemplates
