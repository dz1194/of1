apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: of1
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: OF1 - OpenProject Factory Stack

  sourceRepos:
    - '*'

  destinations:
    - namespace: openproject
      server: https://kubernetes.default.svc
    - namespace: n8n
      server: https://kubernetes.default.svc
    - namespace: monitoring
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
    - group: cert-manager.io
      kind: ClusterIssuer

  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'

  roles:
    - name: admin
      description: Full access to OF1 project
      policies:
        - p, proj:of1:admin, applications, *, of1/*, allow
      groups:
        - of1-admins
