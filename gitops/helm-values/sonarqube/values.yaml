replicaCount: 1

# initSysctl: đặt vm.max_map_count cho Elasticsearch (yêu cầu privileged)
initSysctl:
  enabled: true
  vmMaxMapCount: 262144
  image: busybox:1.36

OpenShift:
  enabled: false

ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: bee-local-ca-issuer
  hosts:
    - name: sonar.bee.local
      path: /
  tls:
    - secretName: sonar-tls
      hosts:
        - sonar.bee.local

resources:
  requests:
    cpu: 500m
    memory: 2Gi
  limits:
    cpu: 1000m
    memory: 4Gi

jvmOpts: "-Xmx512m -Xms256m"
jvmCEOpts: "-Xmx512m -Xms256m"

persistence:
  enabled: true
  storageClass: longhorn
  size: 5Gi

postgresql:
  enabled: true
  primary:
    persistence:
      enabled: true
      storageClass: longhorn
      size: 8Gi
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 512Mi     # Guaranteed QoS: request == limit cho DB
