replicaCount: 1

initSysctl:
  enabled: true
  vmMaxMapCount: 262144
  image: busybox:1.36

OpenShift:
  enabled: false

service:
  type: NodePort
  externalPort: 9000
  internalPort: 9000
  nodePort: 30004

ingress:
  enabled: false

resources:
  requests:
    cpu: 500m
    memory: 2Gi
  limits:
    cpu: 1000m
    memory: 4Gi

jvmOpts: "-Xmx512m -Xms256m"
jvmCEOpts: "-Xmx512m -Xms256m"

persistence:
  enabled: true
  storageClass: longhorn
  size: 5Gi

postgresql:
  enabled: true
  primary:
    persistence:
      enabled: true
      storageClass: longhorn
      size: 8Gi
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 512Mi
