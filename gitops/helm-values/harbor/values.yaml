expose:
  type: nodePort
  tls:
    enabled: false
  nodePort:
    ports:
      http:
        port: 80
        nodePort: 30002

externalURL: http://192.168.110.101:30002

existingSecretAdminPassword: harbor-admin-secret
existingSecretAdminPasswordKey: HARBOR_ADMIN_PASSWORD

existingSecretSecretKey: harbor-secret-key

database:
  type: internal
  internal:
    password: ""
    existingSecret: harbor-db-secret
    existingSecretKey: POSTGRES_PASSWORD

redis:
  type: internal

persistence:
  enabled: true
  resourcePolicy: keep
  imageChartStorage:
    type: s3
    s3:
      regionendpoint: http://minio.minio.svc.cluster.local:9000
      bucket: harbor-registry
      region: us-east-1
      secure: false
      existingSecret: harbor-s3-secret

  persistentVolumeClaim:
    jobservice:
      size: 1Gi
      storageClass: longhorn
    database:
      size: 1Gi
      storageClass: longhorn
    redis:
      size: 1Gi
      storageClass: longhorn
    trivy:
      size: 5Gi
      storageClass: longhorn

core:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

registry:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

jobservice:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

trivy:
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
