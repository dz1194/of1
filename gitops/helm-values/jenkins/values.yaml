controller:
  # Admin credentials — tạo Secret trước khi sync:
  #   kubectl create secret generic jenkins-admin-secret -n jenkins \
  #     --from-literal=jenkins-admin-user=admin \
  #     --from-literal=jenkins-admin-password=CHANGE_ME_STRONG_PASSWORD
  adminSecret: false
  existingSecret: jenkins-admin-secret
  adminUser: jenkins-admin-user
  adminPassword: jenkins-admin-password

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: bee-local-ca-issuer
    hostName: jenkins.bee.local
    tls:
      - secretName: jenkins-tls
        hosts:
          - jenkins.bee.local

  # Plugins cài sẵn
  installPlugins:
    - kubernetes:latest
    - workflow-aggregator:latest
    - git:latest
    - configuration-as-code:latest
    - blueocean:latest

persistence:
  enabled: true
  storageClass: longhorn
  size: 10Gi

agent:
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      # Không đặt CPU limit cho agent để tránh throttling khi build burst
      memory: 2Gi
