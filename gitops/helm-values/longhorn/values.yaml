defaultSettings:
  defaultReplicaCount: 2          # tăng lên 2-3 khi có thêm node
  backupTarget: ""                 # điền sau: s3://platform-backup@hn-1/
  backupTargetCredentialSecret: "" # longhorn-backup-secret (tạo riêng)

persistence:
  defaultClass: true
  defaultClassReplicaCount: 2

longhornUI:
  replicas: 1

ingress:
  enabled: true
  ingressClassName: nginx
  host: longhorn.bee.local
  tls: true
  tlsSecret: longhorn-tls
  annotations:
    cert-manager.io/cluster-issuer: bee-local-ca-issuer
