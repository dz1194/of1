replicaCount: 1

# Admin credentials
# kubectl create secret generic grafana-admin-secret -n grafana \
#   --from-literal=admin-user=admin \
#   --from-literal=admin-password=CHANGE_ME_STRONG_PASSWORD
admin:
  existingSecret: grafana-admin-secret
  userKey: admin-user
  passwordKey: admin-password

ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: bee-local-ca-issuer
  hosts:
    - grafana.bee.local
  tls:
    - secretName: grafana-tls
      hosts:
        - grafana.bee.local

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

persistence:
  enabled: true
  storageClass: longhorn
  size: 5Gi

# Datasource: PostgreSQL read-only user trỏ vào DB của OpenProject
# Tạo user grafana_ro trên PostgreSQL của OpenProject trước (xem §2.4 trong deployment guide)
# kubectl create secret generic grafana-datasource-secret -n grafana \
#   --from-literal=password=CHANGE_ME_RO_PASSWORD
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: OpenProject PostgreSQL
        type: postgres
        url: openproject-postgresql.openproject.svc.cluster.local:5432
        database: openproject
        user: grafana_ro
        secureJsonData:
          password: $__file{/etc/secrets/datasource/password}
        jsonData:
          sslmode: disable
          postgresVersion: 1400
          timescaledb: false
        editable: false

extraSecretMounts:
  - name: datasource-secret
    secretName: grafana-datasource-secret
    defaultMode: 0440
    mountPath: /etc/secrets/datasource
    readOnly: true

# Dashboard provisioning
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: openproject-metrics
        orgId: 1
        folder: OpenProject
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/openproject
