apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: n8n
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  sources:
    - repoURL: https://8gears.container-registry.com/chartrepo/library
      chart: n8n
      targetRevision: 0.25.2
      helm:
        valueFiles:
          - $values/helm-values/n8n/values.yaml
    - repoURL: https://github.com/dz1194/of1.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: n8n
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
