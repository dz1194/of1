apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  sources:
    - repoURL: https://charts.longhorn.io
      chart: longhorn
      targetRevision: 1.7.2
      helm:
        valueFiles:
          - $values/gitops/helm-values/longhorn/values.yaml
    - repoURL: https://github.com/dz1194/of1.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # cần thiết cho Longhorn CRDs lớn
      - RespectIgnoreDifferences=true
      - SkipDryRunOnMissingResource=true
  managedNamespaceMetadata:
    labels:
      app.kubernetes.io/managed-by: Helm
  ignoreDifferences:
    - group: longhorn.io
      kind: Setting
      jsonPointers:
        - /value
    - group: apps
      kind: DaemonSet
      jsonPointers:
        - /spec/template/spec/initContainers
    - group: ""
      kind: ConfigMap
      name: longhorn-default-setting
      jsonPointers:
        - /data
